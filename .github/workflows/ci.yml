name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm

      - name: Verify npm version
        run: test "$(npm --version)" = "10.9.7"
